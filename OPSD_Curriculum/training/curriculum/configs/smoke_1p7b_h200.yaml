# ============================================================
# SMOKE config — Qwen3-1.7B on H200 (×4, ws=4). Identical hyperparameters to
# smoke_1p7b_l40s.yaml (controlled); only the sbatch node/partition differs.
# H200 (141GB) has ample headroom -> slightly higher vLLM mem util.
# B_glob = pd4 * ga2 * ws4 = 32. arm/stages_json/T set on CLI by the sbatch.
# ============================================================

# ---- ModelConfig ----
model_name_or_path: Qwen/Qwen3-1.7B
torch_dtype: bfloat16
attn_implementation: flash_attention_2
use_peft: true
lora_r: 64
lora_alpha: 128
lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

# ---- GOLDConfig (training_args) ----
learning_rate: 5.0e-6
max_grad_norm: 0.1
per_device_train_batch_size: 4
gradient_accumulation_steps: 2
gradient_checkpointing: true
num_train_epochs: 1
max_completion_length: 1024
max_length: 20000
save_steps: 100000
logging_steps: 1
beta: 0
lmbda: 1
temperature: 1.1
top_p: 0.95
top_k: 20
use_vllm: true
vllm_mode: colocate
vllm_gpu_memory_utilization: 0.7
vllm_tensor_parallel_size: 1
output_dir: /scratch/lami2026/personal/jimin_2782/checkpoints/opsd_curriculum/smoke_1p7b
wandb_project: OPSD_Curriculum

# ---- CurriculumScriptArguments / CustomScriptArguments ----
fixed_teacher: true
jsd_token_clip: 0.05
reason_first: false
student_thinking: false
teacher_thinking: true
curriculum_B_glob: 32
attach_gold: false
